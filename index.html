<!DOCTYPE html>
<html>
<head>
    <title>PDF Copy Page</title>

    <script>
        function copyPDF() {
            // Change this to your real GitHub Pages link
            const pdfLink = "sem6javasolvedslips (1).pdf";

            navigator.clipboard.writeText(pdfLink)
                .then(() => {
                    alert("PDF link copied!");
                });
        }
    </script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        a {
            display: block;
            margin: 15px;
            color: green;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h2>📄 My PDF File</h2>

<!-- Open PDF -->
<a href="sem6javasolvedslips (1).pdf" target="_blank">Open PDF</a>

<!-- Copy PDF Link -->
<button onclick="copyPDF()">Copy PDF Link</button>

</body>
</html>
